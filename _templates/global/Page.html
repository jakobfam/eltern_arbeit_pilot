{% extends "otree/Page.html" %}
{% load otree static %}

{% block global_styles  %}
<style>
  .progress-bar-container {
    width: 100%;
    background: #e9ecef;
    border-radius: 6px;
    height: 8px;
    margin-bottom: 18px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: #0d6efd;
    border-radius: 6px;
    transition: width 0.3s ease;
  }
  .progress-text {
    font-size: 0.82rem;
    color: #6c757d;
    margin-bottom: 6px;
  }
</style>
{% endblock %}

{% block global_scripts  %}
{% endblock %}
